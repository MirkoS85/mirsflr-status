owner: MirkoS85
repo: mirsflr-status

sites:
  - name: MirSFlr Website
    url: https://www.mirhollio.com/
    maxResponseTime: 5000
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: "MirSFlr"

  - name: Validator Node Health
    url: https://node.mirhollio.com/flare/ext/health
    maxResponseTime: 5000
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: '"healthy":true'

  - name: FTSO Metrics Feed
    url: https://flare-systems-explorer.flare.network/backend-url/api/v0/entity/0xb5A081dEc72c8C87256b7e14cFAdcbc342bDeac3/ftso
    maxResponseTime: 10000
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: '"last_24h"'

  - name: Validator Metrics Feed
    url: https://api.oracle-daemon.com/v1/flare/validators
    maxResponseTime: 10000
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: "NodeID-8dNfgpspPNDrZD2ksKCRJoGe4Xqe6qVtz"

  - name: Provider Registry
    url: https://flare-systems-explorer.flare.network/backend-url/api/v0/entity/0xb5A081dEc72c8C87256b7e14cFAdcbc342bDeac3
    maxResponseTime: 10000
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: '"display_name":"MirSFlr"'

status-website:
  baseUrl: /mirsflr-status
  logoUrl: https://raw.githubusercontent.com/MirkoS85/mirhollio-website/main/logo.png
  name: MirSFlr Status
  introTitle: "**MirSFlr infrastructure status**"
  introMessage: Independent public checks for the MirSFlr website, validator node health, and external Flare data feeds. Detailed provider metrics remain available on the main dashboard.
  navbar:
    - title: Status
      href: /
    - title: MirSFlr
      href: https://www.mirhollio.com/
